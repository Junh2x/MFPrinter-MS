<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scanlink Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f5f6f8; color: #1a1a1a; }

    /* 로그인 */
    .login-wrap { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: #fff; padding: 40px 32px; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .login-box h1 { font-size: 22px; color: #1B2A4A; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }

    /* 공통 입력 */
    input, select { width: 100%; height: 38px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: -apple-system, 'Segoe UI', sans-serif; outline: none; }
    input:focus, select:focus { border-color: #1B2A4A; }
    label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }

    /* 버튼 */
    .btn { height: 38px; padding: 0 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1B2A4A; color: #fff; }
    .btn-primary:hover { background: #2a3d66; }
    .btn-danger { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e4e4e4; }
    .btn-full { width: 100%; }

    /* 대시보드 */
    .dashboard { display: none; max-width: 1080px; margin: 0 auto; padding: 24px 16px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; color: #1B2A4A; }
    .header-actions { display: flex; gap: 8px; }

    /* 테이블 */
    .table-wrap { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8f9fb; text-align: center; padding: 10px 14px; font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
    td { padding: 12px 10px; font-size: 13px; border-top: 1px solid #f0f0f0; text-align: center; }
    tr.row-clickable { cursor: pointer; }
    tr.row-clickable:hover td { background: #fafbfd; }
    .code { font-family: 'Consolas', monospace; font-weight: 600; letter-spacing: 0.5px; }
    .code-cell { display: inline-flex; align-items: center; justify-content: center; gap: 8px; line-height: 1; }
    .copy-btn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; line-height: 1; padding: 0; border-radius: 4px; }
    .copy-btn:hover { color: #1B2A4A; background: #eef1f7; }
    .empty { text-align: center; padding: 48px; color: #aaa; font-size: 13px; }

    /* 뱃지 */
    .badge { display: inline-block; padding: 4px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; user-select: none; }
    .badge-active { background: #d4edda; color: #155724; }
    .badge-active:hover { background: #c3e6cb; }
    .badge-revoked { background: #f8d7da; color: #721c24; }
    .badge-revoked:hover { background: #f5c6cb; }

    /* 모달 */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 420px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    .modal h2 { font-size: 16px; margin-bottom: 18px; color: #1B2A4A; }
    .modal .field { margin-bottom: 14px; }
    .modal .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal .meta { font-size: 11px; color: #999; margin-top: 4px; }
    .modal .actions { display: flex; gap: 8px; justify-content: space-between; margin-top: 20px; }
    .modal .actions .right { display: flex; gap: 8px; }

    /* 토스트 */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1B2A4A; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: 13px; display: none; z-index: 200; }
    .toast.show { display: block; }
  </style>
</head>
<body>

  <!-- 로그인 -->
  <div class="login-wrap" id="loginView">
    <div class="login-box">
      <h1>Scanlink</h1>
      <p>관리자 인증</p>
      <div style="margin-bottom: 14px;">
        <label>관리자 키</label>
        <input type="password" id="adminKeyInput">
      </div>
      <div id="loginError" style="color:#e74c3c; font-size:12px; margin-bottom:10px; display:none;"></div>
      <button class="btn btn-primary btn-full" onclick="login()">로그인</button>
    </div>
  </div>

  <!-- 대시보드 -->
  <div class="dashboard" id="dashboardView">
    <div class="header">
      <h1>인증코드 관리</h1>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ 코드 생성</button>
        <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>회사구분</th>
            <th>상호명</th>
            <th>상태</th>
            <th>코드</th>
            <th>생성일</th>
            <th>접속일</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="licenseTableBody">
          <tr><td colspan="7" class="empty">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 코드 생성 모달 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h2>인증코드 생성</h2>
      <div class="row-2">
        <div class="field">
          <label>회사구분</label>
          <input type="text" id="newCompanyType">
        </div>
        <div class="field">
          <label>상호명</label>
          <input type="text" id="newCompanyName">
        </div>
      </div>
      <div class="field">
        <label>코드</label>
        <input type="text" id="newCode">
      </div>
      <div class="actions">
        <div></div>
        <div class="right">
          <button class="btn btn-secondary" onclick="closeAddModal()">취소</button>
          <button class="btn btn-primary" onclick="createLicense()">생성</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 코드 편집 모달 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h2>인증코드 편집</h2>
      <div class="row-2">
        <div class="field">
          <label>회사구분</label>
          <input type="text" id="editCompanyType">
        </div>
        <div class="field">
          <label>상호명</label>
          <input type="text" id="editCompanyName">
        </div>
      </div>
      <div class="field">
        <label>코드</label>
        <input type="text" id="editCode">
      </div>
      <div class="field">
        <label>상태</label>
        <select id="editStatus">
          <option value="active">활성화</option>
          <option value="revoked">비활성화</option>
        </select>
      </div>
      <div class="field meta">
        <div>생성일: <span id="editCreatedAt">-</span></div>
        <div>접속일: <span id="editLastUsedAt">-</span></div>
      </div>
      <div class="actions">
        <button class="btn btn-danger" onclick="deleteCurrent()">삭제</button>
        <div class="right">
          <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
          <button class="btn btn-primary" onclick="saveLicense()">저장</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const API = "/api";
  let adminKey = "";
  let editingId = null;

  // --- 로그인 ---
  document.getElementById("adminKeyInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });

  function login() {
    adminKey = document.getElementById("adminKeyInput").value.trim();
    if (!adminKey) return;
    fetchLicenses().then((ok) => {
      if (ok) {
        sessionStorage.setItem("ak", adminKey);
        document.getElementById("loginView").style.display = "none";
        document.getElementById("dashboardView").style.display = "block";
      }
    });
  }

  function logout() {
    adminKey = "";
    sessionStorage.removeItem("ak");
    document.getElementById("dashboardView").style.display = "none";
    document.getElementById("loginView").style.display = "flex";
    document.getElementById("adminKeyInput").value = "";
  }

  (function restore() {
    const saved = sessionStorage.getItem("ak");
    if (saved) {
      adminKey = saved;
      document.getElementById("loginView").style.display = "none";
      document.getElementById("dashboardView").style.display = "block";
      fetchLicenses();
    }
  })();

  // --- API ---
  async function fetchLicenses() {
    try {
      const res = await fetch(`${API}/licenses`, {
        headers: { "X-Admin-Key": adminKey },
      });
      if (!res.ok) {
        if (res.status === 401) {
          document.getElementById("loginError").textContent = "관리자 키가 올바르지 않습니다.";
          document.getElementById("loginError").style.display = "block";
          return false;
        }
        throw new Error("fetch error");
      }
      const data = await res.json();
      renderTable(data.licenses);
      return true;
    } catch (e) {
      console.error(e);
      return false;
    }
  }

  async function createLicense() {
    const code = document.getElementById("newCode").value.trim();
    const companyType = document.getElementById("newCompanyType").value.trim();
    const companyName = document.getElementById("newCompanyName").value.trim();

    if (!code) {
      alert("인증 코드를 입력하세요.");
      return;
    }

    const res = await fetch(`${API}/licenses`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
      body: JSON.stringify({ code, companyType, companyName }),
    });

    if (res.status === 409) {
      alert("이미 존재하는 코드입니다.");
      return;
    }
    if (!res.ok) {
      alert("코드 생성에 실패했습니다.");
      return;
    }

    const data = await res.json();
    closeAddModal();
    showToast(`코드 생성 완료: ${data.code}`);
    fetchLicenses();
  }

  async function patchLicense(id, body) {
    const res = await fetch(`${API}/licenses?id=${encodeURIComponent(id)}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "X-Admin-Key": adminKey },
      body: JSON.stringify(body),
    });
    if (res.status === 409) {
      alert("이미 존재하는 코드입니다.");
      return null;
    }
    if (!res.ok) {
      alert("저장에 실패했습니다.");
      return null;
    }
    return await res.json();
  }

  async function deleteLicense(id, code) {
    if (!confirm(`"${code}" 코드를 삭제하시겠습니까?`)) return false;
    const res = await fetch(`${API}/licenses?id=${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: { "X-Admin-Key": adminKey },
    });
    if (!res.ok) {
      alert("삭제에 실패했습니다.");
      return false;
    }
    showToast("삭제 완료");
    fetchLicenses();
    return true;
  }

  async function toggleStatus(id, currentStatus) {
    const next = currentStatus === "active" ? "revoked" : "active";
    const ok = await patchLicense(id, { status: next });
    if (ok) {
      showToast(next === "active" ? "활성화 처리됨" : "비활성화 처리됨");
      fetchLicenses();
    }
  }

  // --- 렌더링 ---
  function renderTable(licenses) {
    const tbody = document.getElementById("licenseTableBody");
    if (!licenses.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">등록된 인증코드가 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = licenses.map((l) => {
      const payload = escapeAttr(JSON.stringify(l));
      return `
      <tr class="row-clickable" onclick='openEditModal(${payload})'>
        <td>${escapeHtml(l.companyType) || "-"}</td>
        <td>${escapeHtml(l.companyName) || "-"}</td>
        <td><span class="badge badge-${badgeClass(l.status)}"
              onclick="event.stopPropagation(); toggleStatus('${l.id}','${l.status}')">
              ${statusLabel(l.status)}
            </span></td>
        <td class="code">
          <span class="code-cell">
            ${escapeHtml(l.code)}
            <button class="copy-btn" onclick="event.stopPropagation(); copyCode('${l.code}')" title="복사">&#x2398;</button>
          </span>
        </td>
        <td>${formatDate(l.createdAt)}</td>
        <td>${formatDate(l.lastUsedAt)}</td>
        <td></td>
      </tr>`;
    }).join("");
  }

  function statusLabel(s) {
    return s === "revoked" ? "비활성화" : "활성화";
  }
  function badgeClass(s) {
    return s === "revoked" ? "revoked" : "active";
  }

  function formatDate(d) {
    if (!d) return "-";
    const dt = new Date(d);
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, "0");
    const day = String(dt.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function copyCode(code) {
    navigator.clipboard.writeText(code);
    showToast("코드가 복사되었습니다.");
  }

  function escapeHtml(s) {
    if (s == null) return "";
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }
  function escapeAttr(s) {
    return escapeHtml(s);
  }

  // --- 생성 모달 ---
  function openAddModal() {
    document.getElementById("newCode").value = "";
    document.getElementById("newCompanyType").value = "";
    document.getElementById("newCompanyName").value = "";
    document.getElementById("addModal").classList.add("active");
  }
  function closeAddModal() {
    document.getElementById("addModal").classList.remove("active");
  }
  document.getElementById("addModal").addEventListener("click", (e) => {
    if (e.target === document.getElementById("addModal")) closeAddModal();
  });

  // --- 편집 모달 ---
  function openEditModal(license) {
    editingId = license.id;
    document.getElementById("editCompanyType").value = license.companyType || "";
    document.getElementById("editCompanyName").value = license.companyName || "";
    document.getElementById("editCode").value = license.code || "";
    document.getElementById("editStatus").value = license.status === "revoked" ? "revoked" : "active";
    document.getElementById("editCreatedAt").textContent = formatDate(license.createdAt);
    document.getElementById("editLastUsedAt").textContent = formatDate(license.lastUsedAt);
    document.getElementById("editModal").classList.add("active");
  }
  function closeEditModal() {
    editingId = null;
    document.getElementById("editModal").classList.remove("active");
  }
  document.getElementById("editModal").addEventListener("click", (e) => {
    if (e.target === document.getElementById("editModal")) closeEditModal();
  });

  async function saveLicense() {
    if (!editingId) return;
    const body = {
      companyType: document.getElementById("editCompanyType").value.trim(),
      companyName: document.getElementById("editCompanyName").value.trim(),
      code: document.getElementById("editCode").value.trim(),
      status: document.getElementById("editStatus").value,
    };
    if (!body.code) {
      alert("코드는 비워둘 수 없습니다.");
      return;
    }
    const ok = await patchLicense(editingId, body);
    if (ok) {
      closeEditModal();
      showToast("저장 완료");
      fetchLicenses();
    }
  }

  async function deleteCurrent() {
    if (!editingId) return;
    const code = document.getElementById("editCode").value.trim();
    const deleted = await deleteLicense(editingId, code);
    if (deleted) closeEditModal();
  }

  // --- 토스트 ---
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
  }
</script>
</body>
</html>
