function DrawStatCheck( Tbl )
{
var ChildTbl = new Array;
var Childidx = 0;
for( var i = 0; i < Tbl.length; i++ )
{
if( false == Tbl[i].c_func || false == com_index.checkAuth( Tbl[i].auth_flg ) )
{
continue;
}
if( null == Tbl[i].tbl )
{
ChildTbl[Childidx] = CopyJSON( Tbl[i] );
Childidx++;
continue;
