AuthKindNone       : "1",
AuthKindCpca       : "2",
UserTypeAdmin      : "2"
}
function Go_NextPage( cgi_str )
{
var now_time = new Date();
cgi_str += "&Dummy=" + now_time.getTime();
document.location.href = cgi_str;
}
function Draw_UserModeMenu( TBL )
{
document.write('<div class="ContentModuleListUp">');
document.write('<div class="ListUpModuleElement">');
Draw_MainItems( TBL );
document.write('<\/div>');
document.write('<\/div>');
}
function Auth_Check( auth_flg )
{
if( NaviGlobal.AirAuthGenericFlg & auth_flg ) {
return true;
}
if( "false" == NaviGlobal.HasMeapLogin             ||
NaviGlobal.AuthKindNone == NaviGlobal.AuthKind ||
NaviGlobal.AuthKindCpca == NaviGlobal.AuthKind ) {
return true;
}
else if( NaviGlobal.UserTypeAdmin != NaviGlobal.UserType ) {
return false;
}
var AuthJsonAry = [
{ "chkflg" : NaviGlobal.AirAuthDeviceFlg, "auth" : NaviGlobal.HasAuth_Device },
{ "chkflg" : NaviGlobal.AirAuthNetwkFlg,  "auth" : NaviGlobal.HasAuth_Network },
{ "chkflg" : NaviGlobal.AirAuthSystemFlg, "auth" : NaviGlobal.HasAuth_System }
];
for( property in AuthJsonAry ) {
if( !( AuthJsonAry[property].chkflg & auth_flg ) ) {
continue;
}
if( "true" == AuthJsonAry[property].auth ) {
return true;
}
}
return false;
}
function Draw_MainItems( TBL )
{
document.write('<ul>');
for( var i=0 ; i<TBL.length ; i++ )
{
document.write('<li>');
if( null != TBL[i].cgi_str )
{
if( "function" == typeof( UmdMenuTbl[ TBL[i].cgi_str ] ) )
{
document.write('<a href=JavaScript:UmdMenuTbl.' );
document.write( TBL[i].cgi_str );
document.write('()>' );
document.write( TBL[i].title_str );
document.write('<\/a>');
}
else
{
document.write('<a href=\'JavaScript:Go_NextPage(' );
document.write( '"' + TBL[i].cgi_str + '"' );
document.write(')\'>' );
document.write( TBL[i].title_str );
document.write('<\/a>');
}
}
else
{
document.write('<span class="GroupTitle">')
document.write( TBL[i].title_str );
document.write('<\/span>')
}
if( null != TBL[i].tbl )
{
Draw_MainItems( TBL[i].tbl );
}
document.write('<\/li>');
}
document.write('<\/ul>');
}
function menu_obj(
title_str,  
cgi_str, 
c_func,   
auth_flg, 
tbl)  
{
this.title_str  = title_str;
this.cgi_str = cgi_str;
this.c_func   = c_func;
this.auth_flg = auth_flg;
this.tbl  = tbl;
}
//]]>
</script>
