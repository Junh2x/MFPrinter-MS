{

function ComFuncElementCtrlObj( propform )
{
this.propform = propform;
this._func_GetCheckBoxFormat = _func_GetCheckBoxFormat;
this._func_SetCheckBox       = _func_SetCheckBox;
this._func_GetCheckBox       = _func_GetCheckBox;
this._func_SetPullDownList   = _func_SetPullDownList;
this._func_SetRadioButtons   = _func_SetRadioButtons;
this._func_GetRadioButtons   = _func_GetRadioButtons;
this.set       = set;
this.get       = get;
this.isExist   = isExist;
this.isEnabled = isEnabled;
function _func_GetCheckBoxFormat( Element )
{
var CheckBoxFormat = Element.value.split('/');
if( "undefined" == typeof( CheckBoxFormat.length ) ||
2 != CheckBoxFormat.length )
{
return false;
}
this.CheckBoxOffValue = CheckBoxFormat[0];
this.CheckBoxOnValue  = CheckBoxFormat[1];
return true;
}
function _func_SetCheckBox( Element , SetValue )
{
if( true == this._func_GetCheckBoxFormat( Element ) &&
( this.CheckBoxOnValue == SetValue ))
{
Element.checked = true;
return true;
}
return false;
}
function _func_GetCheckBox( Element )
{
if( true == this._func_GetCheckBoxFormat( Element ) )
{
return ( Element.checked == true )
? this.CheckBoxOnValue : this.CheckBoxOffValue ;
}
return false;
}
function _func_SetPullDownList( Element , SetValue )
{
for( i=0 ; i<Element.options.length ; i++ )
{
if( Element.options[i].value == SetValue )
{
Element.selectedIndex = i;
return true;
}
}
return false;
}
function _func_SetRadioButtons( Element , SetValue )
{
if( "undefined" == typeof( Element.length ) )
{
if( Element.value == SetValue )
{
Element.checked = true;
return true;
}
return false;
}
for( var nCnt=0 ; nCnt<Element.length ; nCnt++ )
{
if( Element[ nCnt ].value == SetValue )
{
Element[ nCnt ].checked = true;
return true;
}
}
return false;
}
function _func_GetRadioButtons( Element , DefaultValue )
{
if( "undefined" == typeof( Element.length ))
{
if( true == Element.checked )
{
return Element.value;
}
return DefaultValue;
}
for( nCnt=0 ; nCnt<Element.length ; nCnt++ )
{
if( Element[ nCnt ].checked == true )
{
return Element[ nCnt ].value
}
}
return DefaultValue;
}
function set( ElementName , SetValue )
{
var Element = this.propform.elements[ ElementName ];
if( "undefined" == typeof( Element ) )
{
return false;
}
switch( Element.type )
{
case "checkbox" :
return this._func_SetCheckBox( Element , SetValue );
case "select-one" :
return _func_SetPullDownList( Element , SetValue );
case "text" : case "password" : case "textarea" : case "hidden" :
Element.value = SetValue;
return true;
default :
return _func_SetRadioButtons( Element , SetValue );
}
}
function get( ElementName , DefaultValue )
{
Element = this.propform.elements[ ElementName ];
if( "undefined" == typeof( Element ) )
{
return DefaultValue;
}
switch( Element.type )
{
case "checkbox" :
return this._func_GetCheckBox( Element );
case "select-one" :
return Element.options[ Element.selectedIndex ].value;
case "text" : case "password" : case "textarea" : case "hidden" :
return Element.value ;
default : 
return _func_GetRadioButtons( Element , DefaultValue );
}
}
function isExist( ElementName )
{
Element = this.propform.elements[ ElementName ];
if( "undefined" == typeof( Element ) )
{
return false;
}
return true;
}
function isEnabled( ElementName )
{
Element = this.propform.elements[ ElementName ];
if( "undefined" == typeof( Element ) )
{
return false;
}
if( true == Element.disabled )
{
return false;
}
return true;
}
}

</script>

function ComFuncFormMemberCtrl(

{

{

function _func_MakeDataTbl( subform , propform )
{
var tmpDataTbl = new Array();

{

? new _func_MakeDataObj( subform.elements[ ElementName ] , null )
: new _func_MakeDataObj( subform.elements[ ElementName ] , propform.elements[ ElementName ] );
}
return tmpDataTbl;
}
function _func_GetCmdFuncName( CmdFlag , val_num )
{
return ( CmdFlag + this.DataTbl[ val_num ].SformEle.name );
}
function _func_GetCmdDrawStat( CmdFlag , val_num )
{
if( null == this.DataTbl[ val_num ].PformEle )
{
if( this.CHECK_FLAG == CmdFlag )
{
return false;
}
if( "undefined" == typeof( window[ this.GetCmdFuncName( this.INIT_FLAG , val_num ) ] ) ||
"undefined" == typeof( window[ this.GetCmdFuncName( this.EXEC_FLAG , val_num ) ] ) )
{
return false;
}
}
else if( true == this.DataTbl[ val_num ].PformEle.disabled )
{
if( this.CHECK_FLAG == CmdFlag )
{
return false;
}
}
return true;
}
function _func_UpDateAll( CmdFlag )
{
var val_num;
var Func_name
for( val_num in this.DataTbl )
{

{

}
if( "undefined" != typeof( window[ Func_name ] ))
{
if( false == window[ Func_name ]( this.EleCtrl ) )
{
if( this.CHECK_FLAG == CmdFlag )
{
this.FuncSlctAndFocus( this.DataTbl[ val_num ] );
return false;
}
}
}
else
{
if( this.INIT_FLAG == CmdFlag )
{
this.Init_SetValAll( this.DataTbl[ val_num ] );
}
else if( this.EXEC_FLAG == CmdFlag )
{
this.Exec_SetValAll( this.DataTbl[ val_num ] );
}
}
}
return true;
}
function _func_Init_SetValAll( DataObj )
{
return this.EleCtrl.set( DataObj.SformEle.name , DataObj.SformEle.value );

function _func_FuncSlctAndFocus( DataObj )
{

}
function CheckVal()
{

}
