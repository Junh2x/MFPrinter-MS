var JRL = new function()

{

{
case "undefined" :
alert( ( "undefined" == typeof( defaultMsg ) ) ? "입력한 문자종류에 오류가 있습니다. " : defaultMsg );
break;
case "string" :
alert( alertType );
break;
}
 return false;
};
this.selectForcus = function( Element )
{
if( !Element )
{
return null;
}
if( Element.focus && Element.select )
{
Element.focus();
Element.select();
return true;
}
return false;
};
this.getTag = function( string )
{
if( "undefined" == typeof( string ) )
{
return // "undefined"
}
if( "boolean" == typeof( string ) )
{
return ( true == string ) ? true : false;
}
return ( string + "" );
};
}

JRL.component = new function()
{
function getCheckBoxStat( Element )
{
if( !Element.value.match( /.*\/.*/ ) )
{
return false;
}
var tmpArray = Element.value.split( '/' );
return { off : tmpArray[0] , on : tmpArray[1] };
}
function setCheckBox( Element , SetValue )
{
var CheckBoxStat = getCheckBoxStat( Element );
if( CheckBoxStat )
{
if( CheckBoxStat.on == SetValue )
{
Element.checked = true;
return true;
}
if( CheckBoxStat.off == SetValue )
{
Element.checked = false;
return true;
}
}
return false;
}
function getCheckBox( Element )
{
var CheckBoxStat = getCheckBoxStat( Element );
if( CheckBoxStat )
{
return ( Element.checked == true )
? CheckBoxStat.on : CheckBoxStat.off ;
}
return false;
}
function setPullDown( Element , SetValue )
{
for( var i=0 ; i<Element.options.length ; i++ )
{
if( Element.options[i].value == SetValue )
{
Element.selectedIndex = i;
return true;
}
}
return false;
}
function setRadios( Element , SetValue )
{
if( Element.length )
{
for( var i=0 ; i<Element.length ; i++ )
{
if( Element[i].value == SetValue )
{
Element[i].checked = true;
return true;
}
}
}
else
{
if( Element.value == SetValue )
{
Element.checked = true;
return true;
}
}
return false;
}
function getRadios( Element )
{
if( Element.length )
{
for( var i=0 ; i<Element.length ; i++ )
{
if( Element[i].checked )
{
return Element[i].value
}
}
}
else
{
if( Element.checked )
{
return Element.value;
}
}
return false;
}
function setNodeList( Elements , SetValue )
{
if( "radio" == Elements[0].type )
{
return setRadios( Elements , SetValue );
}
else
{
return false;
}
}
function getNodeList( Elements )
{
if( "radio" == Elements[0].type )
{
return getRadios( Elements );
}
else
{
return false;
}
}
this.set = function( Element , SetValue )
{
if( !Element )
{
return null;
}
if( "hidden" != Element.type && window[ "set_" + Element.name ] )
{
return window[ "set_" + Element.name ]( Element  , SetValue );
}
SetValue += "";

switch( Element.type )
{
case "checkbox" :
return setCheckBox( Element , SetValue );
case "select-one" :
return setPullDown( Element , SetValue );
case "radio" :
return setRadios( Element , SetValue );
case "text" : case "password" : case "textarea" :
case "hidden" :
Element.value = SetValue;
return true;
default : return setNodeList( Element , SetValue );
}
}
this.get = function( Element )
{
if( !Element )
{
return null;
}
if( "hidden" != Element.type && window[ "get_" + Element.name ] )
{
return window[ "get_" + Element.name ]( Element );
}
switch( Element.type )
{
case "checkbox" :
return getCheckBox( Element );
case "select-one" :
return ( -1 == Element.selectedIndex ) ? false : Element.options[ Element.selectedIndex ].value;
case "radio" :
return getRadios( Element );
case "text" : case "password" : case "textarea" :
case "hidden" :
return Element.value;
default :
return getNodeList( Element );
}
}
};


JRL.propctrl = new function() {
var self = this;
var _jsontbl = [];

this.add_json = function(jsontbl) {
_jsontbl = _jsontbl.concat(jsontbl);
};

this.set_json = function(jsontbl) {
_jsontbl = jsontbl;
};

this.exec_proc = function(package_name, plugin_method, _jsontbl_row) {
try {
var ret = eval(package_name + plugin_method + "(_jsontbl_row)");

if("ret_skip" == ret) {
return ret;
}
else if( "ret_err" == ret ) {
return ret;
}
} catch(e) {
return "ret_no_method";
}
return "ret_ok";
}

this.run = function() {
var i;
for(i = 0 ; i < _jsontbl.length ; i++ ) {
for( each_code in _jsontbl[i] ) {
var ret = self.exec_proc('JRL.propctrl.plugin.', each_code, _jsontbl[i]);

if( "ret_err" == ret ) {
alert("error occured. <" + each_code + "> idx<" + i + ">");
return;
}
else if( "ret_skip" == ret ) {
break;
}
}
}
}

this.is_valid_form_member = function(jsontbl_row) {
if( 'undefined' == typeof(jsontbl_row._tf) ||
'undefined' == typeof(jsontbl_row._tm) ) {
return false;
}
return true;
}

this.get_form_member = function(jsontbl_row) {
return jsontbl_row._tf.elements[jsontbl_row._tm];
}

this.plugin = new function() {};
};


JRL.propctrl.plugin._tf = function(jsontbl_row) {
return "ret_ok";
};

JRL.propctrl.plugin._tm = function(jsontbl_row) {
return "ret_ok";
};

JRL.propctrl.plugin._chgv = function(jsontbl_row) {
if(false == JRL.propctrl.is_valid_form_member(jsontbl_row) ) {
return "ret_err";
}

JRL.component.set(JRL.propctrl.get_form_member(jsontbl_row), jsontbl_row._chgv );
};

JRL.propctrl.plugin._chgs = function(jsontbl_row) {
if( 'undefined' == typeof(jsontbl_row._tf) ) {
return "ret_err";
}

var retstat;

if( jsontbl_row._chgs instanceof Array ) {
for(i = 0 ; i < jsontbl_row._chgs.length ; i++ ) {
retstat = JRL.propctrl.exec_proc('JRL.propctrl.plugin._chgs.', jsontbl_row._chgs[i], jsontbl_row);

if( "ret_err" == retstat ) {
alert("error occured. <" + 'JRL.propctrl.plugin._chgs.' + jsontbl_row._chgs[i] + "> idx<" + i + ">");
return retstat;
}
else if( "ret_skip" == retstat ) {
return retstat;
}
}
}
else {
retstat = JRL.propctrl.exec_proc('JRL.propctrl.plugin._chgs.',jsontbl_row._chgs, jsontbl_row);
if( "ret_ok" != retstat ) {
return retstat;
}
}
return "ret_ok";
}

JRL.propctrl.plugin._chgs._lockapi = new function() {
var self = this;

var _taget_element = {};
var _submit_button = {};

var _property_form = {};

var _already_changed = false;

var _target_default_value = {};

var _default_disable_element = {};

this.run = function( TargetElement , submitButton) {
_taget_element = TargetElement;
_submit_button = submitButton;

_property_form = TargetElement.form;

_target_default_value = TargetElement.options[ TargetElement.selectedIndex ].value;

addEventListener( TargetElement , "click" , pullDownListenerFunc );

addButtonListenerFunc();
};

this.lock = function(jsontbl_row, stat) {

if(false == JRL.propctrl.is_valid_form_member(jsontbl_row) ) {
return "ret_err";
}

var form_member = JRL.propctrl.get_form_member(jsontbl_row);

if( "undefined" == typeof( form_member.length ) ||
"select-one" == form_member.type ) {
form_member.disabled = stat;
}
else {
for( var i=0 ; i<form_member.length ; i++ )
{
form_member[ i ].disabled = stat;
}
}

return "ret_ok";
}

function addEventListener( Element , event , ListenerFunc )
{
if( Element.attachEvent )
{
Element.attachEvent( "on" + event  , ListenerFunc );
}
else
{
Element.addEventListener( event  , ListenerFunc , false );
}
}

function CheckNameAndTagName()
{
switch( _property_form.elements[i].tagName )
{
case "FIELDSET" :                     // フィールドセットのエレメント
return false;
}

switch( _property_form.elements[i].name )
{
case _taget_element.name : // メインの項目
case _submit_button.name  : // メインの項目の確定ボタン
case "Cancel_Button" :    // キャンセルボタン
return false;
}
return true;
}

function MakeOthersToDisable()
{
for( i=0 ; i<_property_form.elements.length ; i++ )
{
if( false == CheckNameAndTagName( _property_form.elements[i] ) )
{
continue;
}
if( true == _property_form.elements[i].disabled )
{
_default_disable_element[ _property_form.elements[i].id ] = _property_form.elements[i];
continue;
}

_property_form.elements[i].disabled = true;
}
_submit_button.disabled = false;
_already_changed = true;
}

function MakeOthersToEnable()
{
for( i=0 ; i<_property_form.elements.length ; i++ )
{
if( false == CheckNameAndTagName( _property_form.elements[i] ) )
{
continue;
}

if( null != _default_disable_element[ _property_form.elements[i].id ] )
{
continue;
}

_property_form.elements[i].disabled = false;
}
_submit_button.disabled = true;
_already_changed = false;
}

function makePulldownToDefault()
{
_taget_element.selectedIndex = _target_default_value;
}

function pullDownListenerFunc()
{
if( _target_default_value == _taget_element.options[ _taget_element.selectedIndex ].value )
{
if( true == _already_changed )
{
MakeOthersToEnable();
}
}
else
{
if( false == _already_changed )
{
MakeOthersToDisable();
}
}
}

function addButtonListenerFunc()
{
var oldListenerFunc = _submit_button.onclick;

_submit_button.onclick = MakeOthersToEnable;
addEventListener( _submit_button , "click" , oldListenerFunc );
}

}

JRL.propctrl.plugin._chgs._plock = function(jsontbl_row) {

if(false == JRL.propctrl.is_valid_form_member(jsontbl_row) ) {
return "ret_err";
}

var form_menber = JRL.propctrl.get_form_member(jsontbl_row);

var submitButton = form_menber.form.elements[ form_menber.name + "_Button" ];

submitButton.disabled = true;

JRL.propctrl.plugin._chgs._lockapi.run(
form_menber,
submitButton );

return "ret_skip";
}

JRL.propctrl.plugin._chgs._disable = function(jsontbl_row) {
return JRL.propctrl.plugin._chgs._lockapi.lock(jsontbl_row, true);
}

JRL.propctrl.plugin._chgs._enable = function(jsontbl_row) {
return JRL.propctrl.plugin._chgs._lockapi.lock(jsontbl_row, false);
}

JRL.propctrl.plugin._chgs._pdmenu = function( jsontbl_row ) {

var formMember = JRL.propctrl.get_form_member(jsontbl_row);

if( "select-one" != formMember.type )
{
return "ret_skip";
}

formMember.options.length = jsontbl_row._menulst.length;

for( var idx = 0; idx < jsontbl_row._menulst.length; idx++ )
{
if( !jsontbl_row._menulst[idx].value ||
!jsontbl_row._menulst[idx].text )
{
alert("debug:invalid format. _menulst[" + idx + "]");
continue;
}

formMember.options[idx].value = jsontbl_row._menulst[idx].value;
formMember.options[idx].text = jsontbl_row._menulst[idx].text;
}

return "ret_ok";
}

JRL.formctrl = new function()
{
var propform = null;// 表示用フォーム
var subform  = null;// 送信用フォーム
var INIT_FLAG  = "Init_";// 送信用フォーム->表示用フォーム
var EXEC_FLAG  = "Exec_";// 表示用フォーム->送信用フォーム
var CHECK_FLAG = "Check_";// 入力値チェック
var JSONsubform = new Object();
var JSONpropform = new Object();
var Separator = "-";
function update( CmdFlag )
{
formToJSON( propform , JSONpropform );
convertJson();
for( var ElementName in JSONsubform )
{
if( !getUpdateStat( ElementName ) )
{
continue;
}
var Func_name = CmdFlag + ElementName;
if( window[ Func_name ] )
{
var resultFromOutside = window[ Func_name ]( JSONpropform, JSONsubform , subform[ ElementName ] )
if( !afterOutsideFunc( resultFromOutside , CmdFlag ) )
{
return false;
}
}
else
{
normalUpdate( CmdFlag , ElementName );
}
}
updateFormFromJson( CmdFlag );
return true;
}
function convertJson()
{
for( propaty in JSONpropform )
{
JSONpropform[ propaty ] = JSONpropform[ propaty ] + "";
}
}
function afterOutsideFunc( resultFromOutside , CmdFlag )
{
if( CHECK_FLAG != CmdFlag )
{
return true;
}
if( "string" == typeof( resultFromOutside ) )
{
JRL.selectForcus( propform[ resultFromOutside ] );
return false;
}
return resultFromOutside;
}
function getUpdateStat( sformElementName )
{
if( subform[ sformElementName ] && propform[ sformElementName ] )
{
return true;
}
for( var pformName in JSONpropform )
{
if( pformName.match( new RegExp( sformElementName + Separator + '.?' )) )
{
return true;
}
}
return false;
}
function normalUpdate( CmdFlag , sformElementName )
{
switch( CmdFlag )
{
case INIT_FLAG  : JSONpropform[ sformElementName ] = JSONsubform[ sformElementName ];
break;
case EXEC_FLAG  : JSONsubform[ sformElementName ] = JSONpropform[ sformElementName ];
break;
case CHECK_FLAG : break;
}
}
function updateFormFromJson( CmdFlag )
{
switch( CmdFlag )
{
case INIT_FLAG  : JSONToForm( propform , JSONpropform );
break;
case EXEC_FLAG  : JSONToForm( subform , JSONsubform );
break;
case CHECK_FLAG : break;
}
}
function JSONToForm( targetForm , targetJson )
{
for( var ElementName in targetJson )
{
JRL.component.set( targetForm.elements[ ElementName ] , targetJson[ ElementName ] );
}
}
function formToJsonStatus( Element )
{
if( !Element.name )
{
return false;
}
if( "FIELDSET" == Element.tagName )
{
return false;
}
if( "button" == Element.type )
{
return false;
}
return true;
}
function formToJSON( targetForm , targetJson )
{
for( var i=0 ; i<targetForm.elements.length ; i++ )
{
if( !formToJsonStatus( targetForm.elements[i] ) )
{
continue;
}
var ElementName = targetForm.elements[i].name;
var resultGetValue = JRL.component.get( targetForm.elements[ ElementName ] );
if( "string" != typeof( resultGetValue ) )
{
if( !resultGetValue )
{
continue;
}
}
targetJson[ ElementName ] = resultGetValue;
}
}
this.Separator = Separator;
this.init = function( targetPropform , targetSubform )
{
propform = targetPropform;// 表示用フォーム更新
subform  = targetSubform;// 送信用フォーム更新
formToJSON( subform , JSONsubform );
}
this.pformUpdate = function()
{
return update( INIT_FLAG );
}
this.initAndPformUpdate = function( targetPropform , targetSubform )
{
this.init( targetPropform , targetSubform );
return update( INIT_FLAG );
}
this.sformUpdate = function()
{
return update( EXEC_FLAG );
}
this.checkInput = function()
{
return update( CHECK_FLAG );
}
};
JRL.digit = new function()
{
this.multiplesNumber = function( string , minimum , maximum , multiples )
{
if( true == this.number( string , minimum , maximum ) )
{
if( 0 == string % multiples )
{
return true;
}
}
return JRL.msgAlert( "입력한 수치에 오류가 있습니다. " );
}
this.number = function( string , minimum , maximum , alertType )
{
var defaultMsg = "";
if( true == isNaN( string ) )
{
defaultMsg = "입력한 문자종류에 오류가 있습니다. ";
}
else if( -1 != string.indexOf( ".", 0 ) )
{
defaultMsg = "입력한 문자종류에 오류가 있습니다. ";
}
else if( minimum > string || maximum < string )
{
defaultMsg = "입력한 수치에 오류가 있습니다. ";
}
else
{
return true;
}
return JRL.msgAlert( alertType , defaultMsg );
}
}
JRL.digit.date = new function()
{
this.year = function( string )
{
return JRL.digit.number( string , 2000 , 2038 , "날짜가 잘못 설정되어 있습니다. " );
}
this.month = function( string )
{
return JRL.digit.number( string , 1 , 12 , "날짜가 잘못 설정되어 있습니다. " );
}
this.day = function( year , month , day )
{
var leapYear = function()
{
if( 0 == Math.floor( Math.round( year ) ) % 2000 )
{
return true;
}
else
{
if( 0 != Math.floor( Math.round( year ) ) % 100 &&
0 == Math.floor( Math.round( year ) ) % 4 )
{

function recursive_func(
num,//管理テーブルのキー(数字)
admin_tbl,//管理テーブル
mainmsg,//メインメッセージ
submsg,//サブメッセージ
msg_tbl)//メッセージテーブル
{
var i, j;
var bFlag = false;

for( i = 0 ; i < admin_tbl.length ; i++ )
{
if( num == admin_tbl[i].num)
{
break;
}
}

if( !(i < admin_tbl.length) )
{
msg_tbl[msg_tbl.length] = mainmsg;
msg_tbl[msg_tbl.length] = submsg;

return;
}

for( j = 0 ; j < admin_tbl[i].tbl.length ; j++ )
{
if( admin_tbl[i].dat_num == admin_tbl[i].tbl[j].num )
{
bFlag = true;
break;
}
}

if( false == bFlag )
{
msg_tbl[msg_tbl.length] = mainmsg;
msg_tbl[msg_tbl.length] = "에러가 발생되었을 가능성이 있습니다. " + "조작 패널을 확인해 주십시오.<BR>에러가 표시되어 있는 경우에는 조작 패널 또는 사용설명서에 따라서 대처해 주십시오. " ;

return;
}

var nospace_msg = admin_tbl[i].tbl[j].msg ;

if( nospace_msg.charCodeAt( nospace_msg.length - 1 ) == 0x0020 )
{
nospace_msg =  nospace_msg.substring( 0, nospace_msg.length - 1 );
}

mainmsg = mainmsg.replace(admin_tbl[i].rep_word , nospace_msg );
submsg  = submsg.replace( admin_tbl[i].rep_word , nospace_msg );

recursive_func( num+1, admin_tbl, mainmsg, submsg, msg_tbl);

}
